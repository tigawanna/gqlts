name: Release

# One release path, matching web-help-ai-elements:
# semantic-release computes the version, stamps both packages, builds, then
# publishes @gqlts/runtime and @gqlts/cli at the same version.
on:
  workflow_dispatch:
    inputs:
      dry-run:
        description: 'Run semantic-release in --dry-run mode without publishing'
        required: false
        type: boolean
        default: true
  push:
    branches:
      - master
      - main
      - develop
      - beta
      - alpha
    paths:
      - 'cli/**'
      - 'runtime/**'
      - 'demo-apps/**'
      - 'scripts/release/**'
      - 'package.json'
      - 'bun.lock'
      - '.releaserc.json'
      - '.github/workflows/ci.yml'
      - '.github/workflows/release.yml'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate:
    name: Validate before release
    uses: ./.github/workflows/ci.yml

  release:
    name: Publish
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Cache Bun install
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun ci

      - name: Run semantic-release
        id: semantic_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          GIT_AUTHOR_NAME: gqlts Release Bot
          GIT_AUTHOR_EMAIL: release-bot@gqlts.dev
          GIT_COMMITTER_NAME: gqlts Release Bot
          GIT_COMMITTER_EMAIL: release-bot@gqlts.dev
          DRY_RUN_FLAG: ${{ inputs.dry-run && '--dry-run' || '' }}
        run: |
          set -euo pipefail
          npx semantic-release $DRY_RUN_FLAG 2>&1 | tee release-output.txt

          if grep -qE 'Published release|Created tag' release-output.txt; then
            VERSION=$(grep -oE 'Published release [0-9]+\.[0-9]+\.[0-9]+(-[a-z0-9.]+)?' release-output.txt | sed 's/^Published release //' | head -1)
            if [[ -z "$VERSION" ]]; then
              VERSION=$(grep -oE 'Created tag v[0-9]+\.[0-9]+\.[0-9]+(-[a-z0-9.]+)?' release-output.txt | sed 's/^Created tag v//' | head -1)
            fi
            echo "release_published=true" >> "$GITHUB_OUTPUT"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "release_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Release summary
        if: always()
        env:
          PUBLISHED: ${{ steps.semantic_release.outputs.release_published }}
          VERSION: ${{ steps.semantic_release.outputs.version }}
          TAG: ${{ steps.semantic_release.outputs.tag }}
          DRY_RUN: ${{ inputs.dry-run }}
          BRANCH: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          {
            echo "## Release Summary"
            echo
            if [[ "$DRY_RUN" == "true" ]]; then
              echo "### Dry run - nothing published"
              echo
              echo "Re-run without \`dry-run\` input to publish."
            elif [[ "$PUBLISHED" == "true" ]]; then
              echo "### Published"
              echo
              echo "- **Version:** \`$VERSION\`"
              echo "- **Tag:** \`$TAG\`"
              echo "- **Branch:** \`$BRANCH\`"
              echo "- **Commit:** \`$COMMIT_SHA\`"
              echo
              echo "### Links"
              echo "- [@gqlts/runtime](https://www.npmjs.com/package/@gqlts/runtime/v/$VERSION)"
              echo "- [@gqlts/cli](https://www.npmjs.com/package/@gqlts/cli/v/$VERSION)"
              echo "- [GitHub release](https://github.com/$REPO/releases/tag/$TAG)"
            else
              echo "### No release published"
              echo
              echo "semantic-release decided no release was warranted on \`$BRANCH\`. Common reasons:"
              echo "- No \`feat\` / \`fix\` / \`perf\` commits since the last tag"
              echo "- All new commits use non-release types (\`chore\`, \`docs\`, \`test\`, etc.)"
              echo "- Branch isn't configured for release in \`.releaserc.json\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
